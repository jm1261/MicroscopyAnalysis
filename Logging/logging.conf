[loggers]
keys = root

[handlers]
keys = consoleHandler, FileHandler

[formatters]
keys = defaultFormatter

[logger_root]
level = DEBUG
handlers = consoleHandler, FileHandler

[handler_consoleHandler]
class = StreamHandler
level = DEBUG
formatter = defaultFormatter
args = (sys.stdout,)

[handler_FileHandler]
class = FileHandler
level = DEBUG
formatter = defaultFormatter
args = ('%(logdir)s/Microscopy_%(log_date)s.log', 'a')

[formatter_defaultFormatter]
format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt = %Y-%m-%d %H%M%S